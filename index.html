<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI Magic Playground 福豆查询中心</title>
<style>
body{font-family:sans-serif;background:#f0f4ff;margin:0;padding:0;}
header{background:#4F6CF7;color:#fff;text-align:center;padding:30px 0;font-size:24px;font-weight:bold;}
main{padding:20px;max-width:600px;margin:0 auto;}
label{display:block;margin:15px 0 5px;font-weight:bold;}
input[type=text]{width:100%;padding:8px;font-size:16px;border-radius:5px;border:1px solid #ccc;}
button{margin-top:10px;padding:10px 16px;background:#4F6CF7;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;}
#result{margin-top:20px;padding:15px;background:#fff;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.record{border-top:1px solid #eee;padding:5px 0;}
</style>
</head>
<body>
<header>AI Magic Playground 福豆查询中心</header>
<main>
<label for="queryInput">请输入姓名或工号</label>
<input type="text" id="queryInput" placeholder="例如：Lareina Meng 或 B06382">
<button onclick="searchRecord()">查询积分</button>

<div id="result" style="display:none;">
<h2>查询结果</h2>
<p id="userInfo"></p>
<p id="userScore"></p>
<div id="recentRecords"></div>
</div>

<script>
let records = [];

// 读取 records.json
fetch('records.json')
  .then(res => res.json())
  .then(data => {
    records = data.map(r => {
      // 兼容旧格式
      return {
        name: r.name || r.姓名 || "",
        empId: r.empId || r.工号 || "",
        score: parseInt(r.score || r.积分 || 0),
        type: r.type || r.类型 || "",
        event: r.event || r.活动 || "",
        date: r.date || r.日期 || ""
      };
    });
  })
  .catch(err => {
    console.error('读取 records.json 失败:', err);
    alert('无法加载积分数据，请联系管理员');
  });

function searchRecord() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return alert('请输入姓名或工号');

  const userRecords = records.filter(r =>
    r.name.includes(query) || r.empId.includes(query)
  );

  if (!userRecords.length) {
    document.getElementById('result').style.display = 'block';
    document.getElementById('userInfo').innerText = '未找到对应积分记录';
    document.getElementById('userScore').innerText = '';
    document.getElementById('recentRecords').innerHTML = '';
    return;
  }

  const totalScore = userRecords.reduce((sum, r) => sum + r.score, 0);

  document.getElementById('result').style.display = 'block';
  document.getElementById('userInfo').innerText = `姓名：${userRecords[0].name}  工号：${userRecords[0].empId}`;
  document.getElementById('userScore').innerText = `当前积分：${totalScore}`;
  
  const recentHTML = userRecords
    .sort((a,b) => new Date(b.date) - new Date(a.date))
    .slice(0,10)
    .map(r => `<div class="record">${r.date} — ${r.event} +${r.score}</div>`)
    .join('');
  document.getElementById('recentRecords').innerHTML = `<h3>最近获得积分</h3>${recentHTML}`;
}
</script>
</main>
</body>
</html>
